// ============================================================
//  autoexec.cfg — entry point only.
//  All actual settings live under cfg/<module>/. This file just
//  wires aliases and decides load order. Edit values in cfg/,
//  not here.
// ============================================================

// ---- Unbinds ----

unbind "F1"
unbind "F2"
unbind "F3"
unbind "F4"
unbind "F5"
unbind "F6"
unbind "F7"
unbind "F8"
unbind "F9"
unbind "F10"
unbind "F11"
unbind "F12"
unbind "j"    // report player abuse queue

// ---- Aliases: quick commands ----

alias "d" "disconnect"
alias "r" "retry"
alias "ext" "exit"

alias "s" "PyroAntiSapper"
alias "PyroAntiSapper" "join_class pyro; load_itempreset 0; slot3"

alias "toggle_autoreload" "incrementvar cl_autoreload 0 1 1; echo Autoreload Toggled"

// ---- Aliases: movement (cfg/movement/) ----

alias "WheelBhopOn" "exec cfg/movement/MWheelBhopOn"
alias "WheelBhopOff" "exec cfg/movement/MWheelBhopOff"

// ---- Aliases: sensitivity / fov presets ----

alias "ResetSens" "sensitivity 1.6"
alias "ResetADSSens" "sensitivity 1.2277"
alias "ResetFOV" "fov_desired 90; r_drawviewmodel 1"
alias "ResetVMFOV" "viewmodel_fov 80"
alias "ResetVMADSFOV" "viewmodel_fov 0; r_drawviewmodel 0"

// ---- Aliases: crosshair colors ----

alias "SetCrosshairFunnyColor" "cl_crosshair_red 255; cl_crosshair_green 200; cl_crosshair_blue 255"
alias "SetCrosshairGreenColor" "cl_crosshair_red 0; cl_crosshair_green 255; cl_crosshair_blue 0"

// ---- Aliases: crosshair presets (cfg/crosshair/) ----

alias "SetCrosshairFunny" "exec cfg/crosshair/SetCrosshairFunny; SetCrosshairFunnyColor"
alias "SetCrosshairDot" "exec cfg/crosshair/SetCrosshairDot; SetCrosshairGreenColor"
alias "SetCrosshairO" "exec cfg/crosshair/SetCrosshairO; SetCrosshairGreenColor"
alias "SetCrosshairDynamic" "exec cfg/crosshair/SetCrosshairDynamic; SetCrosshairGreenColor"
alias "SetCrosshairEmpty" "exec cfg/crosshair/SetCrosshairEmpty"

alias "SetDefaultCrosshair" "SetCrosshairO"

// ---- Aliases: per-class crosshair slot hooks ----
// Filled in by the class cfgs (scout.cfg, soldier.cfg, ...) when a
// class needs a different crosshair per weapon slot. Empty = no-op.

alias "CrosshairScoutSlot1" ""
alias "CrosshairScoutSlot2" ""
alias "CrosshairScoutSlot3" ""

alias "CrosshairSoldierSlot1" ""
alias "CrosshairSoldierSlot2" ""
alias "CrosshairSoldierSlot3" ""

alias "CrosshairPyroSlot1" ""
alias "CrosshairPyroSlot2" ""
alias "CrosshairPyroSlot3" ""

alias "CrosshairDemoSlot1" ""
alias "CrosshairDemoSlot2" ""
alias "CrosshairDemoSlot3" ""

alias "CrosshairHeavySlot1" ""
alias "CrosshairHeavySlot2" ""
alias "CrosshairHeavySlot3" ""

alias "CrosshairEngiSlot1" ""
alias "CrosshairEngiSlot2" ""
alias "CrosshairEngiSlot3" ""

alias "CrosshairMedicSlot1" ""
alias "CrosshairMedicSlot2" ""
alias "CrosshairMedicSlot3" ""

alias "CrosshairSniperSlot1" ""
alias "CrosshairSniperSlot2" ""
alias "CrosshairSniperSlot3" ""

alias "CrosshairSpySlot1" ""
alias "CrosshairSpySlot2" ""
alias "CrosshairSpySlot3" ""
alias "CrosshairSpySlot4" ""

// ============================================================
//  Load order — each module exec's exactly once, from here only.
// ============================================================

exec "cfg/hud/CTOn"
exec "cfg/viewmodel/VMOn"
exec "cfg/core/MouseSettings"
exec "cfg/core/AutoSettings"
exec "cfg/sound/SoundButtons"

exec "cfg/graphics/BadGraphics"
//exec "cfg/graphics/ExcellentGraphics"

// ---- Overwrites ----
// Cvars that must win no matter what graphics preset ran above.

r_rimlight 0
mat_filtertextures 1
mat_filterlightmaps 1

// ---- Shader/cache warm-up ----

map_background itemtest
wait 10
disconnect

// ---- Binds ----
bind "F1" "load_itempreset 0"
bind "F2" "load_itempreset 1"
bind "F3" "load_itempreset 2"
bind "F4" "load_itempreset 3"
bind "v" "VMToggle"
bind "h" "taunt 0"
bind "t" "CTToggle"
bind "RCTRL" "exec cfg/core/AutoSettings"    // quick settings reload

echo "autoexec.cfg loaded"
