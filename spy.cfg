exec "reset_binds"

bind "1" "slot1; CrosshairSpySlot1"
bind "2" "slot2; CrosshairSpySlot2"
bind "3" "slot3; CrosshairSpySlot3"
bind "4" "slot4; CrosshairSpySlot4"

bind "mouse5" "+ADSSpy"
alias "+ADSSpy" "fov_desired 75; ResetADSSens; ResetVMADSFOV"
alias "-ADSSpy" "ResetFOV; ResetSens; ResetVMFOV"

bind "CAPSLOCK" "disguise 8 -2"
bind "e" "lastdisguise"

echo "Spy cfg loaded."