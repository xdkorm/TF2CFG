// ============================================================
//  AutoSettings.cfg — plain cvars only.
//  Do NOT exec other modules from here: autoexec.cfg controls
//  load order, this file used to re-exec VMOn / MouseSettings /
//  SoundButtons itself, which just ran them twice. Removed.
// ============================================================

// ---- Budget graph panel ----
budget_panel_bottom_of_history_fraction "0.1"
budget_panel_height "1080"
budget_panel_width "1080"
budget_panel_x "0"
budget_panel_y "0"

// ---- Netcode ----
cl_cmdrate "66"
cl_updaterate "66"
cl_interp "0"
cl_interp_ratio "1"
rate "1048576"

// ---- HUD / misc ----
cl_showhelp "0"
glow_outline_effect_enable "1"
tf_dashboard_slide_time "0.1"
skill "1"

// ---- FOV / sensitivity ----
"ResetFOV"
"ResetSens"

// ---- Performance ----
fps_max "0"
mat_motion_blur_enabled "0"
mat_compressedtextures "1"
mat_queue_mode "2"
mat_trilinear "0"
mat_vsync "0"
r_queued_ropes "1"
r_threaded_particles "1"
host_thread_mode "1"

// ---- Audio ----
snd_mixahead "0.04"

// ---- Echo ----
echo "AutoSettings.cfg loaded"
