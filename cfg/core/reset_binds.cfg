cl_autoreload 1
exec cfg/viewmodel/VMOn
SetDefaultCrosshair

// Specific keys
unbind "e"
unbind "CAPSLOCK"
unbind "ALT"
unbind "mouse4"
unbind "mouse5"

bind "1" "slot1"
bind "2" "slot2"
bind "3" "slot3"
bind "4" "slot4"
bind "5" "slot5"
bind "6" "slot6"
bind "r" "+reload"

bind "mouse1" "+attack"
bind "mouse2" "+attack2"