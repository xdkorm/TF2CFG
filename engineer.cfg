exec "cfg/core/reset_binds"

// Bind mouse buttons to build specific buildings
bind "e" "destroy 2; build 2" // Build Sentry
bind "CAPSLOCK" "destroy 3; build 3" // Build Teleporter Exit
bind "mouse4" "destroy 1; build 1 0" // Build Teleporter Entrance
bind "mouse5" "destroy 0; build 0 0" // Build Dispenser
bind "r" "eureka_teleport 0"
bind "4" "eureka_teleport 1"

bind "1" "slot1; CrosshairEngiSlot1"
bind "2" "slot2; CrosshairEngiSlot2"
bind "3" "slot3; CrosshairEngiSlot3"

echo "Engineer cfg loaded: E=Sentry, CAPSLOCK=Tele Exit, MOUSE4=Tele Entrance, MOUSE5=Dispenser."