// Alias

alias "SoundVolumeLowest" "volume 0.005; bind F10 SoundOffLowest"
alias "SoundOffLowest" "volume 0; bind F10 SoundVolumeLowest"
alias "SoundVolumeLow" "volume 0.01; bind F10 SoundOffLow"
alias "SoundOffLow" "volume 0; bind F10 SoundVolumeLow"
alias "SoundVolumeMedium" "volume 0.025; bind F10 SoundOffMedium"
alias "SoundOffMedium" "volume 0; bind F10 SoundVolumeMedium"
alias "SoundVolumeHigh" "volume 0.1; bind F10 SoundOffHigh"
alias "SoundOffHigh" "volume 0; bind F10 SoundVolumeHigh"

alias "VoiceOn" "voice_enable 1; bind F9 VoiceOff"
alias "VoiceOff" "voice_enable 0; bind F9 VoiceOn"

// Binds

bind "F5" "SoundVolumeLowest"
bind "F6" "SoundVolumeLow"
bind "F7" "SoundVolumeMedium"
bind "F8" "SoundVolumeHigh"

// ~Vars~

"SoundVolumeMedium"
"VoiceOn"